<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Razorpay Payment</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:10px;
      width:400px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    input{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      margin-top:20px;
      padding:12px 20px;
      border:none;
      background:#3399cc;
      color:white;
      border-radius:5px;
      cursor:pointer;
      width:100%;
      font-size:16px;
    }

    button:hover{
      background:#287aa3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Razorpay Payment</h2>

    <input type="number" id="amount" placeholder="Enter Amount" />

    <button id="payBtn">
      Pay Now
    </button>
  </div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="module" src="./js/payment.js"></script>

</body>
</html>
